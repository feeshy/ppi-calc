<!DOCTYPE html>
<html lang="zh" dir="ltr">

<head>
    <meta charset=utf-8>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title id="i18n-title">PPI计算器</title>
    <meta property="og:title" content="PPI计算器 (PWA)" />
    <meta name="keywords" content="PPI, 像素密度, 分辨率, 缩放, HiDPI, 高分屏, PWA">
    <meta name="description" id="i18n-desc" property="og:description" content="一个更加智能的PPI计算器。自动获取屏幕分辨率，输入屏幕尺寸即可计算像素密度并提供高分屏缩放比例建议，支持PWA离线运行">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- the icon is made by Freepik -->
    <!-- https://www.flaticon.com/authors/freepik -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/logo-180x180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/logo-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/logo-16x16.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <script src="ppi-calc.js" defer></script>
</head>

<body>
    <div class="container">
        <header>
            <h1><img src="assets/logo.png"><span id="i18n-header">PPI 计算器</span></h1>
            <a href="https://github.com/feeshy/ppi-calc" class="source-link" target="_blank">source code</a>
        </header>

        <!-- 输入区卡片 -->
        <section class="card">
            <div class="input-group">
                <label for="pixelW" id="i18n-label-w">屏幕宽度</label> <span id="cmW" class="cm-hint"></span>
                <div class="input-control">
                    <div class="input-main">
                        <input id="pixelW" type="number" placeholder="0">
                        <span class="unit" id="i18n-pixel-w">像素</span>
                    </div>
                </div>
            </div>
            <div class="input-group">
                <label for="pixelH" id="i18n-label-h">屏幕高度</label> <span id="cmH" class="cm-hint"></span>
                <div class="input-control">
                    <div class="input-main">
                        <input id="pixelH" type="number" placeholder="0">
                        <span class="unit" id="i18n-pixel-h">像素</span>
                    </div>
                </div>
            </div>
            <div class="input-group">
                <label for="inchD" id="i18n-label-d">对角长度</label> <span id="cmD" class="cm-hint"></span>
                <div class="input-control">
                    <div class="input-main">
                        <input id="inchD" type="number" step="0.1" placeholder="0">
                        <span class="unit" id="i18n-inch-d">英寸</span>
                    </div>
                </div>
            </div>
            <div class="checkbox-group">
                <label for="isPenTile" id="i18n-label-pentile" style="margin:0">PenTile 排列</label>
                <input type="checkbox" id="isPenTile">
            </div>
        </section>

        <!-- 结果与建议展示卡片 -->
        <section id="result-card" class="card hidden">
            <div id="result">
                <p id="ppi"></p>
                <div id="tooLow"></div>
            </div>

            <!-- 缩放建议部分 -->
            <div id="recommend" class="hidden">
                <p id="i18n-suggest-title" class="section-title">系统缩放建议</p>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th></th>
                                <th id="i18n-th-larger">更大字号</th>
                                <th id="i18n-th-current" class="thisDevice hidden">当前</th>
                                <th id="i18n-th-more">更多内容</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td id="i18n-td-ratio">比例</td>
                                <td id="scaleFacLgr">___%</td>
                                <td id="scaleFac" class="thisDevice hidden">___%</td>
                                <td id="scaleFacMore">___%</td>
                            </tr>
                            <tr>
                                <td id="i18n-td-res">CSS 分辨率</td>
                                <td id="resLgr">-</td>
                                <td id="res" class="thisDevice hidden">-</td>
                                <td id="resMore">-</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Office 打印缩放建议 -->
            <div id="officeScale" class="hidden">
                <p id="i18n-office-title" class="section-title">Office 缩放建议</p>
                <img src="assets/officeScale.png" loading="lazy" alt="screenshot" onerror="this.style.display='none'">
                <p id="i18n-office-desc" style="color:var(--text-sec); margin:0;"></p>
            </div>
        </section>
    </div>
</body>

</html>
