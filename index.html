<!DOCTYPE html>
<html lang="zh" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PPI计算器 - 像素密度与缩放建议</title>



    <meta name="keywords" content="PPI, 像素密度, 在线PPI计算器, PPI计算公式, 屏幕分辨率, 缩放, HiDPI, 高分屏, PWA">
    <meta name="description" content="在线PPI计算器：自动获取屏幕分辨率，输入屏幕尺寸即可计算像素密度(PPI)。提供HiDPI/PenTile等效换算和系统缩放建议，支持PWA离线运行。">
    <meta name="baidu-site-verification" content="codeva-UNzFD5RRSz" />

    <link rel="canonical" href="https://ppi.feeshy.top/">
    <link rel="alternate" hreflang="zh" href="https://ppi.feeshy.top/">
    <link rel="alternate" hreflang="en" href="https://ppi.feeshy.top/en">
    <link rel="alternate" hreflang="x-default" href="https://ppi.feeshy.top/">

    <meta property="og:title" content="PPI计算器 - 像素密度与缩放建议">
    <meta property="og:description" content="在线PPI计算器：自动获取屏幕分辨率，输入屏幕尺寸即可计算像素密度(PPI)。提供HiDPI/PenTile等效换算和系统缩放建议，支持PWA离线运行。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ppi.feeshy.top/">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <script src="ppi-calc.js" defer></script>

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "PPI计算器",
        "url": "https://ppi.feeshy.top/",
        "description": "在线PPI计算器，自动获取屏幕分辨率，输入屏幕尺寸即可计算像素密度并提供高分屏缩放比例建议",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "All",
        "browserRequirements": "Requires JavaScript",
        "offers": { "@type": "Offer", "price": "0" },
        "inLanguage": "zh-CN"
    }
    </script>
</head>

<body>
    <header>
        <a href="./en" class="source-link" lang="en" onclick="setLang('en')">English</a>
    </header>
    <main class="container">

        <h1><object type="image/svg+xml" data="favicon.svg" aria-hidden="true"></object> <span>PPI 计算器</span></h1>

        <!-- 输入区卡片 -->
        <section class="card">
            <div class="input-group">
                <label for="pixelW">屏幕宽度</label> <span id="cmW" class="cm-hint"></span>
                <div class="input-control">
                    <div class="input-main">
                        <input id="pixelW" type="number" placeholder="0">
                        <span class="unit">像素</span>
                    </div>
                </div>
            </div>
            <div class="input-group">
                <label for="pixelH">屏幕高度</label> <span id="cmH" class="cm-hint"></span>
                <div class="input-control">
                    <div class="input-main">
                        <input id="pixelH" type="number" placeholder="0">
                        <span class="unit">像素</span>
                    </div>
                </div>
            </div>
            <div class="input-group">
                <label for="inchD">对角长度</label> <span id="cmD" class="cm-hint"></span>
                <div class="input-control">
                    <div class="input-main">
                        <input id="inchD" type="number" step="0.1" placeholder="0">
                        <span class="unit">英寸</span>
                    </div>
                </div>
            </div>
            <div class="checkbox-group">
                <label for="isPenTile" style="margin:0">PenTile 排列</label>
                <input type="checkbox" id="isPenTile">
            </div>
        </section>

        <!-- 结果与建议展示卡片 -->
        <section id="result-card" class="card hidden">
            <div id="result">
                <p id="ppi"></p>
                <div id="tooLow"></div>
            </div>

            <!-- 缩放建议部分 -->
            <div id="recommend" class="hidden">
                <p class="section-title">系统缩放建议</p>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th></th>
                                <th>更大字号</th>
                                <th class="thisDevice hidden">当前</th>
                                <th>更多内容</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>比例</td>
                                <td id="scaleFacLgr">___%</td>
                                <td id="scaleFac" class="thisDevice hidden">___%</td>
                                <td id="scaleFacMore">___%</td>
                            </tr>
                            <tr>
                                <td>CSS 分辨率</td>
                                <td id="resLgr">-</td>
                                <td id="res" class="thisDevice hidden">-</td>
                                <td id="resMore">-</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Office 打印缩放建议 -->
            <div id="officeScale" class="hidden">
                <p class="section-title">Office 缩放建议</p>
                <img src="officeScale.png" loading="lazy" alt="MS Office 缩放设置参考截图：调整 Office 缩放比实现 1:1 打印预览" onerror="this.style.display='none'">
                <p id="i18n-office-desc" style="color:var(--text-sec); margin:0;"></p>
            </div>
        </section>

    </main>

    <footer>
        <a href="https://github.com/feeshy/ppi-calc" target="_blank" rel="noopener" class="source-link">源码</a>
        <a href="https://feeshy.top" target="_blank" class="source-link">博客</a>
    </footer>

    <script>
        window.l10n = {
            penTileHint: '等效',
            warnDistance: '建议拉远距离观看',
            warnUpgrade: '建议升级高分屏',
            inputHint: '请输入对角尺寸',
            officeDescWin: '当前系统缩放比例下，将 MS Office 缩放设为 <b style="color:var(--accent)">%s</b>，即可实现 1:1 打印预览。',
            officeDescMac: '当前系统缩放比例下，将 MS Office 缩放设为 <b style="color:var(--accent)">%s</b>，即可实现 1:1 打印预览。'
        };
    </script>
</body>

</html>
